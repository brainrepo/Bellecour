<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 420" fill="none">
  <defs>
    <linearGradient id="roseBtn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <filter id="greenGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="380" height="420" rx="14" fill="#0c0c0e"/>
  <rect width="380" height="420" rx="14" fill="none" stroke="#ffffff08" stroke-width="1"/>

  <!-- Title -->
  <text x="190" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#3f3f46" text-anchor="middle" letter-spacing="0.1em">RESULT VIEW</text>

  <!-- Result Card -->
  <g transform="translate(20, 36)" filter="url(#cardShadow)">
    <rect width="340" height="370" rx="14" fill="rgba(18,18,22,0.97)" stroke="#ffffff10" stroke-width="1"/>

    <!-- Header -->
    <g transform="translate(20, 20)">
      <circle cx="0" cy="0" r="4.5" fill="#34d399" filter="url(#greenGlow)"/>
      <text x="14" y="3" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#ffffff2e" letter-spacing="0.1em">TRANSCRIPTION</text>
      <!-- Active badge -->
      <rect x="220" y="-9" width="64" height="20" rx="10" fill="rgba(244,63,94,0.1)"/>
      <text x="252" y="5" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#fda4af" text-anchor="middle">Grammar</text>
    </g>

    <!-- Audio player -->
    <g transform="translate(16, 40)">
      <rect width="308" height="32" rx="8" fill="#ffffff05" stroke="#ffffff08" stroke-width="0.5"/>
      <!-- Play button -->
      <circle cx="20" cy="16" r="8" fill="#ffffff08"/>
      <polygon points="18,12 24,16 18,20" fill="#ffffff73"/>
      <!-- Progress bar -->
      <rect x="36" y="14" width="200" height="3" rx="1.5" fill="#ffffff10"/>
      <rect x="36" y="14" width="80" height="3" rx="1.5" fill="#fda4af" opacity="0.6"/>
      <circle cx="116" cy="15.5" r="4" fill="#fda4af" opacity="0.8"/>
      <!-- Time -->
      <text x="250" y="19" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#ffffff40">0:04 / 0:12</text>
    </g>

    <!-- Text area -->
    <g transform="translate(16, 82)">
      <rect width="308" height="156" rx="10" fill="#ffffff05" stroke="#ffffff08" stroke-width="0.5"/>
      <text x="14" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#ffffffdd">I need to schedule a meeting with</text>
      <text x="14" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#ffffffdd">the design team to review the new</text>
      <text x="14" y="62" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#ffffffdd">dashboard mockups. We should also</text>
      <text x="14" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#ffffffdd">discuss the timeline for the API</text>
      <text x="14" y="102" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#ffffffdd">migration and make sure everyone</text>
      <text x="14" y="122" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#ffffffdd">is aligned on the priorities for</text>
      <text x="14" y="142" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#ffffffdd">next sprint.</text>
    </g>

    <!-- Toolbar -->
    <g transform="translate(16, 248)">
      <rect width="308" height="38" rx="10" fill="#ffffff05" stroke="#ffffff08" stroke-width="0.5"/>

      <!-- Grammar (active) -->
      <g transform="translate(6, 5)">
        <rect width="34" height="28" rx="7" fill="rgba(244,63,94,0.08)" stroke="rgba(244,63,94,0.2)" stroke-width="0.5"/>
        <text x="17" y="15" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#fda4af" text-anchor="middle">Aa</text>
        <text x="28" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="7" font-weight="700" fill="#fda4af" opacity="0.7">1</text>
      </g>

      <!-- Formal -->
      <g transform="translate(44, 5)">
        <rect width="34" height="28" rx="7" fill="#ffffff03" stroke="transparent" stroke-width="0.5"/>
        <!-- Briefcase icon -->
        <g transform="translate(10, 6)">
          <rect x="0" y="4" width="14" height="10" rx="2" fill="none" stroke="#ffffff73" stroke-width="1.2"/>
          <path d="M4 4 V2 C4 1 5 0 7 0 C9 0 10 1 10 2 V4" fill="none" stroke="#ffffff73" stroke-width="1.2"/>
        </g>
        <text x="28" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="7" font-weight="700" fill="#ffffff40" opacity="0.6">2</text>
      </g>

      <!-- Smile -->
      <g transform="translate(82, 5)">
        <rect width="34" height="28" rx="7" fill="#ffffff03" stroke="transparent" stroke-width="0.5"/>
        <circle cx="17" cy="13" r="7" fill="none" stroke="#ffffff73" stroke-width="1.2"/>
        <circle cx="14" cy="11" r="1" fill="#ffffff73"/>
        <circle cx="20" cy="11" r="1" fill="#ffffff73"/>
        <path d="M13 15 C14 17 20 17 21 15" fill="none" stroke="#ffffff73" stroke-width="1"/>
        <text x="28" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="7" font-weight="700" fill="#ffffff40" opacity="0.6">3</text>
      </g>

      <!-- Scissors -->
      <g transform="translate(120, 5)">
        <rect width="34" height="28" rx="7" fill="#ffffff03" stroke="transparent" stroke-width="0.5"/>
        <text x="17" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#ffffff73" text-anchor="middle">&#9986;</text>
        <text x="28" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="7" font-weight="700" fill="#ffffff40" opacity="0.6">4</text>
      </g>

      <!-- Actions -->
      <g transform="translate(158, 5)">
        <rect width="34" height="28" rx="7" fill="#ffffff03" stroke="transparent" stroke-width="0.5"/>
        <!-- List icon -->
        <g transform="translate(9, 6)">
          <rect x="0" y="0" width="4" height="4" rx="1" fill="none" stroke="#ffffff73" stroke-width="1"/>
          <line x1="7" y1="2" x2="16" y2="2" stroke="#ffffff73" stroke-width="1"/>
          <rect x="0" y="6" width="4" height="4" rx="1" fill="none" stroke="#ffffff73" stroke-width="1"/>
          <line x1="7" y1="8" x2="14" y2="8" stroke="#ffffff73" stroke-width="1"/>
          <rect x="0" y="12" width="4" height="4" rx="1" fill="none" stroke="#ffffff73" stroke-width="1"/>
          <line x1="7" y1="14" x2="12" y2="14" stroke="#ffffff73" stroke-width="1"/>
        </g>
        <text x="28" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="7" font-weight="700" fill="#ffffff40" opacity="0.6">5</text>
      </g>

      <!-- IT -->
      <g transform="translate(196, 5)">
        <rect width="34" height="28" rx="7" fill="#ffffff03" stroke="transparent" stroke-width="0.5"/>
        <text x="17" y="17" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="800" fill="#ffffff73" text-anchor="middle" letter-spacing="0.04em">IT</text>
        <text x="28" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="7" font-weight="700" fill="#ffffff40" opacity="0.6">6</text>
      </g>

      <!-- EN -->
      <g transform="translate(234, 5)">
        <rect width="34" height="28" rx="7" fill="#ffffff03" stroke="transparent" stroke-width="0.5"/>
        <text x="17" y="17" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="800" fill="#ffffff73" text-anchor="middle" letter-spacing="0.04em">EN</text>
        <text x="28" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="7" font-weight="700" fill="#ffffff40" opacity="0.6">7</text>
      </g>

      <!-- FR -->
      <g transform="translate(272, 5)">
        <rect width="34" height="28" rx="7" fill="#ffffff03" stroke="transparent" stroke-width="0.5"/>
        <text x="17" y="17" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="800" fill="#ffffff73" text-anchor="middle" letter-spacing="0.04em">FR</text>
        <text x="28" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="7" font-weight="700" fill="#ffffff40" opacity="0.6">8</text>
      </g>
    </g>

    <!-- Action Buttons -->
    <g transform="translate(16, 296)">
      <!-- Discard -->
      <rect width="100" height="34" rx="8" fill="#ffffff08" stroke="#ffffff10" stroke-width="0.5"/>
      <!-- X icon -->
      <g transform="translate(28, 11)">
        <line x1="0" y1="0" x2="8" y2="8" stroke="#ffffff73" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="8" y1="0" x2="0" y2="8" stroke="#ffffff73" stroke-width="1.5" stroke-linecap="round"/>
      </g>
      <text x="50" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#ffffff73">Discard</text>

      <!-- Paste -->
      <rect x="108" width="200" height="34" rx="8" fill="url(#roseBtn)"/>
      <!-- Clipboard icon -->
      <g transform="translate(158, 9)">
        <rect x="0" y="3" width="10" height="12" rx="1.5" fill="none" stroke="white" stroke-width="1.2"/>
        <rect x="3" y="0" width="4" height="3" rx="1" fill="none" stroke="white" stroke-width="1"/>
        <line x1="3" y1="8" x2="7" y2="8" stroke="white" stroke-width="0.8" opacity="0.6"/>
        <line x1="3" y1="10.5" x2="6" y2="10.5" stroke="white" stroke-width="0.8" opacity="0.6"/>
      </g>
      <text x="181" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="white">Paste</text>
    </g>

    <!-- Keyboard hints -->
    <g transform="translate(16, 340)">
      <rect width="80" height="18" rx="4" fill="#ffffff06" stroke="#ffffff08" stroke-width="0.5"/>
      <text x="40" y="12" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="500" fill="#ffffff25" text-anchor="middle">Esc to discard</text>
      <rect x="88" width="90" height="18" rx="4" fill="#ffffff06" stroke="#ffffff08" stroke-width="0.5"/>
      <text x="133" y="12" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="500" fill="#ffffff25" text-anchor="middle">Enter to paste</text>
      <rect x="186" width="122" height="18" rx="4" fill="#ffffff06" stroke="#ffffff08" stroke-width="0.5"/>
      <text x="247" y="12" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="500" fill="#ffffff25" text-anchor="middle">0 to revert original</text>
    </g>
  </g>
</svg>

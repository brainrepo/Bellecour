<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 150" fill="none">
  <defs>
    <filter id="recShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="redGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="420" height="150" rx="14" fill="#0c0c0e"/>
  <rect width="420" height="150" rx="14" fill="none" stroke="#ffffff08" stroke-width="1"/>

  <!-- Title -->
  <text x="210" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#3f3f46" text-anchor="middle" letter-spacing="0.1em">RECORDING STATE</text>

  <!-- Recording Pill -->
  <g transform="translate(55, 40)" filter="url(#recShadow)">
    <rect width="310" height="68" rx="34" fill="rgba(26,26,30,0.95)" stroke="#ffffff10" stroke-width="1"/>

    <!-- Pulsing red dot -->
    <circle cx="40" cy="34" r="6" fill="#f87171" filter="url(#redGlow)">
      <animate attributeName="opacity" values="1;0.35;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>

    <!-- Waveform bars -->
    <g transform="translate(65, 8)">
      <rect x="0"   y="16" width="3" height="20" rx="1.5" fill="#fda4af" opacity="0.45">
        <animate attributeName="height" values="20;12;20" dur="0.8s" repeatCount="indefinite"/>
        <animate attributeName="y" values="16;20;16" dur="0.8s" repeatCount="indefinite"/>
      </rect>
      <rect x="6"   y="10" width="3" height="32" rx="1.5" fill="#fda4af" opacity="0.6">
        <animate attributeName="height" values="32;18;32" dur="1.1s" repeatCount="indefinite"/>
        <animate attributeName="y" values="10;17;10" dur="1.1s" repeatCount="indefinite"/>
      </rect>
      <rect x="12"  y="4"  width="3" height="44" rx="1.5" fill="#fda4af" opacity="0.8">
        <animate attributeName="height" values="44;22;44" dur="0.7s" repeatCount="indefinite"/>
        <animate attributeName="y" values="4;15;4" dur="0.7s" repeatCount="indefinite"/>
      </rect>
      <rect x="18"  y="12" width="3" height="28" rx="1.5" fill="#fda4af" opacity="0.55">
        <animate attributeName="height" values="28;14;28" dur="0.9s" repeatCount="indefinite"/>
        <animate attributeName="y" values="12;19;12" dur="0.9s" repeatCount="indefinite"/>
      </rect>
      <rect x="24"  y="2"  width="3" height="48" rx="1.5" fill="#fda4af" opacity="0.9">
        <animate attributeName="height" values="48;28;48" dur="0.6s" repeatCount="indefinite"/>
        <animate attributeName="y" values="2;12;2" dur="0.6s" repeatCount="indefinite"/>
      </rect>
      <rect x="30"  y="8"  width="3" height="36" rx="1.5" fill="#fda4af" opacity="0.7">
        <animate attributeName="height" values="36;16;36" dur="1.0s" repeatCount="indefinite"/>
        <animate attributeName="y" values="8;18;8" dur="1.0s" repeatCount="indefinite"/>
      </rect>
      <rect x="36"  y="14" width="3" height="24" rx="1.5" fill="#fda4af" opacity="0.5">
        <animate attributeName="height" values="24;10;24" dur="0.85s" repeatCount="indefinite"/>
        <animate attributeName="y" values="14;21;14" dur="0.85s" repeatCount="indefinite"/>
      </rect>
      <rect x="42"  y="6"  width="3" height="40" rx="1.5" fill="#fda4af" opacity="0.75">
        <animate attributeName="height" values="40;20;40" dur="0.75s" repeatCount="indefinite"/>
        <animate attributeName="y" values="6;16;6" dur="0.75s" repeatCount="indefinite"/>
      </rect>
      <rect x="48"  y="10" width="3" height="32" rx="1.5" fill="#fda4af" opacity="0.6">
        <animate attributeName="height" values="32;14;32" dur="1.05s" repeatCount="indefinite"/>
        <animate attributeName="y" values="10;19;10" dur="1.05s" repeatCount="indefinite"/>
      </rect>
      <rect x="54"  y="16" width="3" height="20" rx="1.5" fill="#fda4af" opacity="0.45">
        <animate attributeName="height" values="20;8;20" dur="0.95s" repeatCount="indefinite"/>
        <animate attributeName="y" values="16;22;16" dur="0.95s" repeatCount="indefinite"/>
      </rect>
      <rect x="60"  y="6"  width="3" height="40" rx="1.5" fill="#fda4af" opacity="0.8">
        <animate attributeName="height" values="40;24;40" dur="0.65s" repeatCount="indefinite"/>
        <animate attributeName="y" values="6;14;6" dur="0.65s" repeatCount="indefinite"/>
      </rect>
      <rect x="66"  y="12" width="3" height="28" rx="1.5" fill="#fda4af" opacity="0.55">
        <animate attributeName="height" values="28;12;28" dur="1.15s" repeatCount="indefinite"/>
        <animate attributeName="y" values="12;20;12" dur="1.15s" repeatCount="indefinite"/>
      </rect>
      <rect x="72"  y="4"  width="3" height="44" rx="1.5" fill="#fda4af" opacity="0.85">
        <animate attributeName="height" values="44;20;44" dur="0.55s" repeatCount="indefinite"/>
        <animate attributeName="y" values="4;16;4" dur="0.55s" repeatCount="indefinite"/>
      </rect>
      <rect x="78"  y="10" width="3" height="32" rx="1.5" fill="#fda4af" opacity="0.65">
        <animate attributeName="height" values="32;16;32" dur="0.88s" repeatCount="indefinite"/>
        <animate attributeName="y" values="10;18;10" dur="0.88s" repeatCount="indefinite"/>
      </rect>
      <rect x="84"  y="18" width="3" height="16" rx="1.5" fill="#fda4af" opacity="0.4">
        <animate attributeName="height" values="16;8;16" dur="1.2s" repeatCount="indefinite"/>
        <animate attributeName="y" values="18;22;18" dur="1.2s" repeatCount="indefinite"/>
      </rect>
      <rect x="90"  y="8"  width="3" height="36" rx="1.5" fill="#fda4af" opacity="0.7">
        <animate attributeName="height" values="36;18;36" dur="0.72s" repeatCount="indefinite"/>
        <animate attributeName="y" values="8;17;8" dur="0.72s" repeatCount="indefinite"/>
      </rect>
      <rect x="96"  y="14" width="3" height="24" rx="1.5" fill="#fda4af" opacity="0.5">
        <animate attributeName="height" values="24;10;24" dur="1.0s" repeatCount="indefinite"/>
        <animate attributeName="y" values="14;21;14" dur="1.0s" repeatCount="indefinite"/>
      </rect>
      <rect x="102" y="6"  width="3" height="40" rx="1.5" fill="#fda4af" opacity="0.75">
        <animate attributeName="height" values="40;22;40" dur="0.68s" repeatCount="indefinite"/>
        <animate attributeName="y" values="6;15;6" dur="0.68s" repeatCount="indefinite"/>
      </rect>
      <rect x="108" y="12" width="3" height="28" rx="1.5" fill="#fda4af" opacity="0.55">
        <animate attributeName="height" values="28;14;28" dur="0.92s" repeatCount="indefinite"/>
        <animate attributeName="y" values="12;19;12" dur="0.92s" repeatCount="indefinite"/>
      </rect>
      <rect x="114" y="16" width="3" height="20" rx="1.5" fill="#fda4af" opacity="0.45">
        <animate attributeName="height" values="20;10;20" dur="1.1s" repeatCount="indefinite"/>
        <animate attributeName="y" values="16;21;16" dur="1.1s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- Timer -->
    <text x="256" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#ffffff40" letter-spacing="-0.01em">0:12</text>
  </g>

  <!-- Annotation -->
  <text x="210" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#52525b" text-anchor="middle">Hold ⌃⌘B — release to transcribe</text>
</svg>

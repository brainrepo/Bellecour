        <path d="M1 2 V0.5 C1 -1 7 -1 7 0.5 V2" fill="none" stroke="#a78bfa" stroke-width="0.8" opacity="0.6"/>
      </g>
      <text x="306" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#c4b5fd">Keychain</text>
      <text x="306" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="#52525b">Secure API key storage</text>

      <g transform="translate(418, 14)">
        <rect x="0" y="0" width="10" height="10" rx="2" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.6"/>
        <text x="5" y="8" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="#a78bfa" text-anchor="middle" opacity="0.6">V</text>
      </g>

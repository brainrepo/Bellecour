      <rect width="216" height="44" rx="8" fill="#18181b" stroke="rgba(59,130,246,0.2)" stroke-width="1"/>
      <rect x="8" y="8" width="6" height="6" rx="1.5" fill="url(#blueG)" opacity="0.8"/>
      <text x="20" y="15" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#93c5fd">Settings Window</text>
      <text x="12" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#71717a">SettingsPanel.tsx · transformations.ts</text>

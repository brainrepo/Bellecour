      <rect x="8" y="8" width="6" height="6" rx="1.5" fill="url(#orangeG)" opacity="0.8"/>
      <text x="20" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#fdba74">config.rs</text>
      <text x="20" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="#71717a">macOS Keychain + settings</text>

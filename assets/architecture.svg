  <rect width="720" height="360" rx="14" fill="none" stroke="#ffffff08" stroke-width="1"/>

  <!-- Title -->
  <text x="360" y="24" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#3f3f46" text-anchor="middle" letter-spacing="0.1em">ARCHITECTURE</text>

  <!-- ═══ Frontend Column ═══ -->
  <g transform="translate(24, 44)">

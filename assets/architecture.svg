      <text x="20" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#fdba74">usage.rs</text>
      <text x="20" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="#71717a">Cost tracking + history</text>

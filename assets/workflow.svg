<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 160" fill="none">
  <defs>
    <linearGradient id="roseg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
    <linearGradient id="cardg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e1e22"/>
      <stop offset="100%" stop-color="#16161a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="160" rx="16" fill="#0c0c0e"/>
  <rect width="900" height="160" rx="16" fill="none" stroke="#ffffff08" stroke-width="1"/>

  <!-- Step 1: Idle Pill -->
  <g transform="translate(40, 55)" filter="url(#shadow)">
    <rect width="72" height="36" rx="18" fill="#1a1a1e" stroke="#ffffff10" stroke-width="1"/>
    <!-- Mic icon -->
    <g transform="translate(18, 10)">
      <rect x="3" y="0" width="6" height="10" rx="3" fill="#fda4af" opacity="0.7"/>
      <path d="M2 8 C2 12 10 12 10 8" stroke="#fda4af" stroke-width="1.2" fill="none" opacity="0.7"/>
      <line x1="6" y1="12" x2="6" y2="15" stroke="#fda4af" stroke-width="1.2" opacity="0.7"/>
    </g>
    <text x="44" y="23" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#ffffff73" letter-spacing="0.06em">EN</text>
  </g>
  <text x="76" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#71717a" text-anchor="middle">Idle</text>

  <!-- Arrow 1 -->
  <g transform="translate(128, 68)">
    <line x1="0" y1="5" x2="30" y2="5" stroke="#3f3f46" stroke-width="1.5"/>
    <polygon points="30,0 40,5 30,10" fill="#3f3f46"/>
    <text x="20" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600" fill="#52525b" text-anchor="middle">HOLD</text>
    <text x="20" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600" fill="#52525b" text-anchor="middle">⌃⌘B</text>
  </g>

  <!-- Step 2: Recording Pill -->
  <g transform="translate(185, 45)" filter="url(#shadow)">
    <rect width="160" height="56" rx="28" fill="#1a1a1e" stroke="#ffffff10" stroke-width="1"/>
    <!-- Red dot -->
    <circle cx="28" cy="28" r="4.5" fill="#f87171" filter="url(#glow)"/>
    <!-- Waveform bars -->
    <g transform="translate(48, 12)">
      <rect x="0"  y="10" width="2.5" height="12" rx="1.25" fill="#fda4af" opacity="0.5"/>
      <rect x="5"  y="6"  width="2.5" height="20" rx="1.25" fill="#fda4af" opacity="0.6"/>
      <rect x="10" y="3"  width="2.5" height="26" rx="1.25" fill="#fda4af" opacity="0.8"/>
      <rect x="15" y="8"  width="2.5" height="16" rx="1.25" fill="#fda4af" opacity="0.65"/>
      <rect x="20" y="2"  width="2.5" height="28" rx="1.25" fill="#fda4af" opacity="0.9"/>
      <rect x="25" y="6"  width="2.5" height="20" rx="1.25" fill="#fda4af" opacity="0.7"/>
      <rect x="30" y="10" width="2.5" height="12" rx="1.25" fill="#fda4af" opacity="0.45"/>
      <rect x="35" y="4"  width="2.5" height="24" rx="1.25" fill="#fda4af" opacity="0.75"/>
      <rect x="40" y="8"  width="2.5" height="16" rx="1.25" fill="#fda4af" opacity="0.55"/>
      <rect x="45" y="11" width="2.5" height="10" rx="1.25" fill="#fda4af" opacity="0.4"/>
    </g>
    <!-- Timer -->
    <text x="126" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#ffffff40" letter-spacing="-0.01em">0:04</text>
  </g>
  <text x="265" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#71717a" text-anchor="middle">Recording</text>

  <!-- Arrow 2 -->
  <g transform="translate(362, 68)">
    <line x1="0" y1="5" x2="30" y2="5" stroke="#3f3f46" stroke-width="1.5"/>
    <polygon points="30,0 40,5 30,10" fill="#3f3f46"/>
    <text x="20" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600" fill="#52525b" text-anchor="middle">RELEASE</text>
  </g>

  <!-- Step 3: Processing -->
  <g transform="translate(418, 50)" filter="url(#shadow)">
    <rect width="140" height="46" rx="23" fill="#1a1a1e" stroke="rgba(244,63,94,0.2)" stroke-width="1"/>
    <!-- Spinner -->
    <g transform="translate(28, 23)">
      <circle cx="0" cy="0" r="7" fill="none" stroke="#ffffff14" stroke-width="1.5"/>
      <path d="M0 -7 A7 7 0 0 1 7 0" fill="none" stroke="#fda4af" stroke-width="1.5" stroke-linecap="round">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="0.7s" repeatCount="indefinite"/>
      </path>
    </g>
    <text x="50" y="27" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#ffffff73">Transcribing...</text>
  </g>
  <text x="488" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#71717a" text-anchor="middle">Processing</text>

  <!-- Arrow 3 -->
  <g transform="translate(575, 68)">
    <line x1="0" y1="5" x2="30" y2="5" stroke="#3f3f46" stroke-width="1.5"/>
    <polygon points="30,0 40,5 30,10" fill="#3f3f46"/>
  </g>

  <!-- Step 4: Result Card (mini) -->
  <g transform="translate(622, 30)" filter="url(#shadow)">
    <rect width="160" height="96" rx="10" fill="url(#cardg)" stroke="#ffffff10" stroke-width="1"/>
    <!-- Header -->
    <circle cx="16" cy="16" r="3.5" fill="#34d399"/>
    <text x="26" y="19" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="700" fill="#ffffff2e" letter-spacing="0.08em">TRANSCRIPTION</text>
    <!-- Text area -->
    <rect x="8" y="28" width="144" height="28" rx="5" fill="#ffffff05" stroke="#ffffff08" stroke-width="0.5"/>
    <text x="14" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#ffffffcc" opacity="0.8">Hello, this is a test of</text>
    <text x="14" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#ffffffcc" opacity="0.8">the voice transcription...</text>
    <!-- Toolbar -->
    <g transform="translate(8, 62)">
      <rect width="20" height="14" rx="4" fill="rgba(244,63,94,0.08)" stroke="rgba(244,63,94,0.2)" stroke-width="0.5"/>
      <text x="10" y="10" font-family="system-ui, -apple-system, sans-serif" font-size="6" font-weight="600" fill="#fda4af" text-anchor="middle">Aa</text>
      <rect x="23" width="20" height="14" rx="4" fill="#ffffff05" stroke="#ffffff08" stroke-width="0.5"/>
      <text x="33" y="10" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="#ffffff73" text-anchor="middle">&#128188;</text>
      <rect x="46" width="20" height="14" rx="4" fill="#ffffff05" stroke="#ffffff08" stroke-width="0.5"/>
      <text x="56" y="10" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="#ffffff73" text-anchor="middle">&#9986;</text>
      <rect x="69" width="20" height="14" rx="4" fill="#ffffff05" stroke="#ffffff08" stroke-width="0.5"/>
      <text x="79" y="10" font-family="system-ui, -apple-system, sans-serif" font-size="6" font-weight="700" fill="#ffffff73" text-anchor="middle">IT</text>
      <rect x="92" width="20" height="14" rx="4" fill="#ffffff05" stroke="#ffffff08" stroke-width="0.5"/>
      <text x="102" y="10" font-family="system-ui, -apple-system, sans-serif" font-size="6" font-weight="700" fill="#ffffff73" text-anchor="middle">EN</text>
      <rect x="115" width="20" height="14" rx="4" fill="#ffffff05" stroke="#ffffff08" stroke-width="0.5"/>
      <text x="125" y="10" font-family="system-ui, -apple-system, sans-serif" font-size="6" font-weight="700" fill="#ffffff73" text-anchor="middle">FR</text>
    </g>
    <!-- Buttons -->
    <g transform="translate(8, 80)">
      <rect width="60" height="14" rx="5" fill="#ffffff08" stroke="#ffffff10" stroke-width="0.5"/>
      <text x="30" y="10" font-family="system-ui, -apple-system, sans-serif" font-size="7" font-weight="600" fill="#ffffff73" text-anchor="middle">Discard</text>
      <rect x="64" width="80" height="14" rx="5" fill="url(#roseg)"/>
      <text x="104" y="10" font-family="system-ui, -apple-system, sans-serif" font-size="7" font-weight="600" fill="white" text-anchor="middle">Paste</text>
    </g>
  </g>
  <text x="702" y="143" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#71717a" text-anchor="middle">Result</text>

  <!-- Arrow 4 -->
  <g transform="translate(798, 68)">
    <line x1="0" y1="5" x2="30" y2="5" stroke="#3f3f46" stroke-width="1.5"/>
    <polygon points="30,0 40,5 30,10" fill="#3f3f46"/>
    <text x="20" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600" fill="#52525b" text-anchor="middle">ENTER</text>
  </g>

  <!-- Step 5: Pasted -->
  <g transform="translate(845, 52)">
    <circle cx="20" cy="20" r="18" fill="rgba(52,211,153,0.08)" stroke="rgba(52,211,153,0.25)" stroke-width="1"/>
    <!-- Clipboard icon -->
    <g transform="translate(12, 10)">
      <rect x="2" y="3" width="12" height="16" rx="2" fill="none" stroke="#6ee7b7" stroke-width="1.3"/>
      <rect x="5" y="0" width="6" height="4" rx="1" fill="none" stroke="#6ee7b7" stroke-width="1.3"/>
      <line x1="6" y1="9" x2="12" y2="9" stroke="#6ee7b7" stroke-width="1" opacity="0.6"/>
      <line x1="6" y1="12" x2="11" y2="12" stroke="#6ee7b7" stroke-width="1" opacity="0.6"/>
      <line x1="6" y1="15" x2="9" y2="15" stroke="#6ee7b7" stroke-width="1" opacity="0.6"/>
    </g>
  </g>
  <text x="865" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#6ee7b7" text-anchor="middle">Pasted!</text>
</svg>
